name: linkedin-shortcut
base: core24
version: '2.0'
summary: A customizable LinkedIn shortcut daemon.
description: |
  A background daemon that listens for a shortcut and launches LinkedIn.
  Configure the keyboard and user using 'snap set'.

grade: stable
confinement: strict

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [amd64]
    build-for: [arm64]

apps:
  daemon:
    command: bin/run-daemon.sh
    daemon: simple
    restart-condition: always
    plugs:
      - raw-input
      - desktop
  setup:
    command: bin/setup.sh
    plugs:
      - raw-input

parts:
  build-daemon:
    plugin: make
    source: .
