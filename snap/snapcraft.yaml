name: quick-linkedin
base: core24
version: '3.1'
summary: A strictly confined LinkedIn shortcut daemon.
description: |
  Uses a Client/Server IPC architecture to bridge hardware events
  to the user's graphical session cleanly.

grade: stable
confinement: strict

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  daemon:
    command: bin/run-daemon.sh
    daemon: simple
    restart-condition: always
    plugs:
      - raw-input
  agent:
    command: bin/run-agent.sh
    autostart: quick-linkedin.desktop
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - home  # Add this to resolve mount namespace issues
  setup:
    command: bin/setup.sh

parts:
  build-c-binaries:
    plugin: make
    source: .
